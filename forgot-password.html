<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — Swcart</title>
<link rel="icon" href="https://tools.swinfosystems.online/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<style>
  :root{--ink:#1A1410;--red:#E8472A;--orange:#FF8A3D;--cream:#FFF8F2;--body:#2E2E2E;--line:#F0E2D8;}
  *{box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;color:var(--body);background:var(--cream);margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;}
  input, button{font-family:'Inter',sans-serif;}
  h1,h2,h3{font-family:'Poppins',sans-serif;color:var(--ink);}
  a{text-decoration:none;color:var(--red);font-weight:600;transition:.2s;}
  a:hover{color:var(--ink);}

  .auth-wrapper{width:100%;max-width:440px;padding:20px;}
  .auth-card{background:#fff;border-radius:24px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,.06);border:1px solid var(--line);text-align:center;}
  
  .brand{display:inline-flex;align-items:center;gap:10px;margin-bottom:30px;}
  .brand img{height:46px;width:46px;border-radius:12px;}
  .brand .name{font-family:'Poppins',sans-serif;font-weight:800;font-size:1.8rem;color:var(--ink);line-height:1;}
  .brand .name span{color:var(--red);}

  h1{font-size:1.6rem;font-weight:800;margin:0 0 8px;}
  p{color:#9a8f86;font-size:.95rem;margin:0 0 30px;}

  .form-group{margin-bottom:20px;text-align:left;}
  label{display:block;font-size:.85rem;font-weight:600;color:var(--ink);margin-bottom:8px;}
  input{width:100%;background:#F9F6F4;border:2px solid transparent;border-radius:14px;padding:14px 16px;font-size:1rem;color:var(--ink);transition:.3s;outline:none;}
  input:focus{border-color:var(--orange);background:#fff;box-shadow:0 0 0 4px rgba(255,138,61,.1);}

  .btn-submit{width:100%;background:var(--red);color:#fff;border:none;border-radius:14px;padding:16px;font-weight:700;font-size:1.05rem;cursor:pointer;transition:.3s;}
  .btn-submit:hover{background:var(--ink);transform:translateY(-2px);box-shadow:0 10px 20px rgba(0,0,0,.1);}

  .auth-footer{margin-top:24px;font-size:.9rem;color:#9a8f86;}
</style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <a href="index.html" class="brand">
        <img src="https://tools.swinfosystems.online/icon-192.png" alt="Swcart">
        <div class="name">Sw<span>cart</span></div>
      </a>
      
      <h1>Reset Password</h1>
      <p>Enter your email to receive a reset link.</p>

      <form action="login.html">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="name@example.com" required>
        </div>
        
        <button type="submit" class="btn-submit">Send Reset Link</button>
      </form>
      
      <div class="auth-footer">
        Remember your password? <a href="login.html">Log in</a>
      </div>
    </div>
  </div>
</body>
</html>
