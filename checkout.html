<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — Swcart</title>
<link rel="icon" href="https://tools.swinfosystems.online/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<style>
  :root{--ink:#1A1410;--red:#E8472A;--orange:#FF8A3D;--cream:#FFF8F2;--body:#2E2E2E;--line:#F0E2D8;}
  *{box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;color:var(--body);background:#f9f6f4;margin:0;}
  input, button{font-family:'Inter',sans-serif;}
  h1,h2,h3,h4{font-family:'Poppins',sans-serif;color:var(--ink);}
  a{text-decoration:none;}

  .site-header{background:#fff;border-bottom:1px solid var(--line);padding:16px 0;position:sticky;top:0;z-index:50;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand img{height:42px;width:42px;border-radius:10px;}
  .brand .name{font-family:'Poppins',sans-serif;font-weight:800;font-size:1.6rem;color:var(--ink);line-height:1;}
  .brand .name span{color:var(--red);}

  .checkout-layout{padding:40px 0 80px;}
  
  .c-card{background:#fff;border-radius:24px;padding:32px;border:1px solid var(--line);box-shadow:0 10px 30px rgba(0,0,0,.03);margin-bottom:24px;}
  .c-card h2{font-weight:800;font-size:1.4rem;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
  .c-card h2 i{color:var(--red);}

  .form-group{margin-bottom:16px;}
  label{display:block;font-size:.85rem;font-weight:600;color:var(--ink);margin-bottom:8px;}
  input{width:100%;background:#F9F6F4;border:2px solid transparent;border-radius:12px;padding:14px;font-size:1rem;color:var(--ink);transition:.3s;outline:none;}
  input:focus{border-color:var(--orange);background:#fff;box-shadow:0 0 0 4px rgba(255,138,61,.1);}

  .summary-card{background:var(--ink);border-radius:24px;padding:32px;color:#fff;}
  .summary-card h2{color:#fff;font-weight:800;font-size:1.4rem;margin-bottom:24px;}
  .s-row{display:flex;justify-content:space-between;margin-bottom:12px;font-size:.95rem;color:#cfc3b8;}
  .s-total{display:flex;justify-content:space-between;margin-top:20px;padding-top:20px;border-top:1px solid rgba(255,255,255,.1);font-weight:800;font-size:1.4rem;color:#fff;}

  .btn-pay{width:100%;background:var(--red);color:#fff;border:none;border-radius:14px;padding:16px;font-weight:700;font-size:1.1rem;cursor:pointer;transition:.3s;margin-top:24px;}
  .btn-pay:hover{background:#fff;color:var(--red);transform:translateY(-2px);}


  .util-bar{background:#f8f9fa;font-size:.8rem;color:#666;padding:8px 0;border-bottom:1px solid var(--line);}
  .util-bar a{color:#666;margin-left:15px;text-decoration:none;transition:.2s;}
  .util-bar a:hover{color:var(--ink);}

  .site-header{background:#fff;border-bottom:1px solid var(--line);padding:16px 0;position:sticky;top:0;z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,.02);}
  .brand{display:flex;align-items:center;gap:10px;text-decoration:none!important;}
  .brand img{height:42px;width:42px;border-radius:10px;}
  .brand .name{font-family:'Poppins',sans-serif;font-weight:800;font-size:1.6rem;color:var(--ink);line-height:1;}
  .brand .name span{color:var(--red);}
  .brand .tagline{font-size:.75rem;color:#9a8f86;font-weight:600;}

  .search-wrap{position:relative;}
  .search-wrap input{width:100%;background:#f4f0ec;border:2px solid transparent;border-radius:12px;padding:12px 20px 12px 46px;font-size:.95rem;color:var(--ink);transition:.3s;outline:none;}
  .search-wrap input:focus{background:#fff;border-color:var(--orange);box-shadow:0 0 0 4px rgba(255,138,61,.1);}
  .search-wrap i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#9a8f86;font-size:1.1rem;}
  .search-wrap button{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--ink);color:#fff;border:none;border-radius:8px;padding:6px 14px;font-weight:600;font-size:.85rem;transition:.2s;}
  .search-wrap button:hover{background:var(--red);}
  
  .header-icon-btn{background:none;border:none;color:var(--ink);font-weight:600;font-size:.95rem;display:flex;align-items:center;gap:8px;transition:.2s;padding:8px 12px;border-radius:10px;}
  .header-icon-btn:hover{background:var(--cream);color:var(--red);}
  .icon-wrap{position:relative;font-size:1.3rem;display:flex;align-items:center;}

</style>
</head>
<body>


<div class="util-bar">
  <div class="container d-flex justify-content-between">
    <div>Free delivery on orders above ₹499</div>
    <div class="d-none d-md-block">
      <a href="track-order.html">Track Order</a>
      <a href="help.html">Help Center</a>
      <a href="sell.html">Sell on Swcart</a>
    </div>
  </div>
</div>

<header class="site-header">
  <div class="container">
    <div class="row align-items-center g-3">
      <div class="col-6 col-lg-2 d-flex align-items-center gap-2">
        <a href="index.html" class="brand">
          <img src="https://tools.swinfosystems.online/icon-192.png" alt="Swcart logo">
          <div>
            <div class="name">Sw<span>cart</span></div>
            <div class="tagline d-none d-sm-block">Everything, one cart</div>
          </div>
        </a>
      </div>
      <div class="col-12 col-lg-6 order-3 order-lg-2">
        <div class="search-wrap">
          <i class="bi bi-search"></i>
          <input type="text" placeholder="Search for products, brands and more">
          <button>Search</button>
        </div>
      </div>
      <div class="col-6 col-lg-4 order-2 order-lg-3">
        <div class="d-flex justify-content-end gap-3">
          <a href="profile.html" class="header-icon-btn d-none d-sm-flex">
            <i class="bi bi-person-circle"></i>
            <span class="d-none d-md-inline">Account</span>
          </a>
          <a href="index.html" class="header-icon-btn">
            <span class="icon-wrap"><i class="bi bi-heart"></i></span>
            <span class="d-none d-md-inline">Wishlist</span>
          </a>
          <a href="checkout.html" class="header-icon-btn">
            <span class="icon-wrap"><i class="bi bi-cart3"></i><span class="badge-count" id="globalCartCount" style="position:absolute;top:-6px;right:-8px;background:var(--red);color:#fff;font-size:.65rem;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;display:none;">0</span></span>
            <span class="d-none d-md-inline">Cart</span>
          </a>
        </div>
      </div>
    </div>
  </div>
</header>


<div class="container checkout-layout">
  <div class="row g-4">
    <div class="col-lg-7">
      <div class="c-card">
        <h2><i class="bi bi-geo-alt"></i> Shipping Details</h2>
        <div class="row">
          <div class="col-md-6 form-group">
            <label>First Name</label>
            <input type="text" placeholder="John">
          </div>
          <div class="col-md-6 form-group">
            <label>Last Name</label>
            <input type="text" placeholder="Doe">
          </div>
          <div class="col-12 form-group">
            <label>Street Address</label>
            <input type="text" placeholder="123 Shopping Avenue">
          </div>
          <div class="col-md-6 form-group">
            <label>City</label>
            <input type="text" placeholder="Mumbai">
          </div>
          <div class="col-md-6 form-group">
            <label>Postal Code</label>
            <input type="text" placeholder="400001">
          </div>
        </div>
      </div>

      <div class="c-card">
        <h2><i class="bi bi-credit-card"></i> Payment Method</h2>
        <div class="form-group">
          <label>Card Number</label>
          <input type="text" placeholder="0000 0000 0000 0000">
        </div>
        <div class="row">
          <div class="col-6 form-group">
            <label>Expiry Date</label>
            <input type="text" placeholder="MM/YY">
          </div>
          <div class="col-6 form-group">
            <label>CVV</label>
            <input type="text" placeholder="123">
          </div>
        </div>
      </div>
    </div>
    
    <div class="col-lg-5">
      <div class="summary-card">
        <h2>Order Summary</h2>
        <div class="s-row"><span>Subtotal</span> <span id="s-sub">₹0</span></div>
        <div class="s-row"><span>Shipping</span> <span>Free</span></div>
        <div class="s-row"><span>Taxes</span> <span id="s-tax">₹0</span></div>
        <div class="s-total"><span>Total</span> <span id="s-total">₹0</span></div>
        <button class="btn-pay" onclick="alert('Order Placed Successfully!')">Pay Now</button>
      </div>
    </div>
  </div>
</div>

<script>
  // Simple logic to pull total from localStorage cart (since index.html does this)
  const cart = JSON.parse(localStorage.getItem("swcart_cart") || "{}");
  const PRODUCTS = [
    {id:"p1", price:1999}, {id:"p2", price:2799}, {id:"p3", price:1299},
    {id:"p4", price:1599}, {id:"p5", price:1099}, {id:"p6", price:2299},
    {id:"p7", price:1399}, {id:"p8", price:2199}, {id:"p9", price:1799},
    {id:"p10", price:899}, {id:"p11", price:1649}, {id:"p12", price:1529},
    {id:"p13", price:2899}, {id:"p14", price:899}, {id:"p15", price:699},
    {id:"p16", price:1049}, {id:"p17", price:1349}, {id:"p18", price:999},
    {id:"p19", price:649}, {id:"p20", price:799}, {id:"p21", price:899},
    {id:"p22", price:3299}, {id:"p23", price:1199}, {id:"p24", price:899},
    {id:"p25", price:2499}
  ];
  let sub = 0;
  for(let id in cart){
    const p = PRODUCTS.find(x=>x.id===id);
    if(p) sub += p.price * cart[id];
  }
  const tax = Math.round(sub * 0.18);
  const total = sub + tax;
  
  document.getElementById("s-sub").textContent = "₹" + sub.toLocaleString('en-IN');
  document.getElementById("s-tax").textContent = "₹" + tax.toLocaleString('en-IN');
  document.getElementById("s-total").textContent = "₹" + total.toLocaleString('en-IN');
</script>
</body>
</html>
