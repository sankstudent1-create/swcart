<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Categories — Swcart</title>
<link rel="icon" href="https://tools.swinfosystems.online/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<style>
  :root{
    --ink:#1A1410;
    --red:#E8472A;
    --orange:#FF8A3D;
    --cream:#FFF8F2;
    --body:#2E2E2E;
    --line:#F0E2D8;
  }
  *{box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;color:var(--body);background:#fff;margin:0;}
  h1,h2,h3,h4,.display{font-family:'Poppins',sans-serif;color:var(--ink);}
  a{text-decoration:none;}

  .site-header{background:#fff;border-bottom:1px solid var(--line);padding:16px 0;position:sticky;top:0;z-index:50;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand img{height:42px;width:42px;border-radius:10px;}
  .brand .name{font-family:'Poppins',sans-serif;font-weight:800;font-size:1.6rem;color:var(--ink);line-height:1;}
  .brand .name span{color:var(--red);}

  .page-title{text-align:center;padding:60px 20px 40px;}
  .page-title h1{font-weight:800;font-size:2.8rem;margin-bottom:10px;}
  .page-title p{color:#9a8f86;font-size:1.1rem;max-width:500px;margin:0 auto;}

  .cat-grid{padding:0 0 80px;}
  .cat-card{display:block;position:relative;border-radius:24px;overflow:hidden;aspect-ratio:4/3;box-shadow:0 10px 30px rgba(0,0,0,.08);transition:transform .4s;}
  .cat-card:hover{transform:translateY(-8px);}
  .cat-img{width:100%;height:100%;object-fit:cover;transition:transform .6s;}
  .cat-card:hover .cat-img{transform:scale(1.08);}
  
  .cat-overlay{position:absolute;inset:0;background:linear-gradient(to top, rgba(26,20,16,.8) 0%, rgba(26,20,16,.2) 50%, rgba(0,0,0,0) 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:24px;}
  .cat-overlay h3{color:#fff;font-weight:800;font-size:1.6rem;margin-bottom:4px;}
  .cat-overlay span{color:var(--orange);font-weight:600;font-size:.95rem;display:flex;align-items:center;gap:6px;}
  .cat-overlay span i{transition:transform .3s;}
  .cat-card:hover .cat-overlay span i{transform:translateX(6px);}

  footer{background:var(--ink);color:#cfc3b8;padding:60px 0 24px;margin-top:auto;}
  .footer-bottom{border-top:1px solid rgba(255,255,255,.1);margin-top:36px;padding-top:20px;font-size:.8rem;color:#8a7e74;text-align:center;}

  .util-bar{background:#f8f9fa;font-size:.8rem;color:#666;padding:8px 0;border-bottom:1px solid var(--line);}
  .util-bar a{color:#666;margin-left:15px;text-decoration:none;transition:.2s;}
  .util-bar a:hover{color:var(--ink);}

  .site-header{background:#fff;border-bottom:1px solid var(--line);padding:16px 0;position:sticky;top:0;z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,.02);}
  .brand{display:flex;align-items:center;gap:10px;text-decoration:none!important;}
  .brand img{height:42px;width:42px;border-radius:10px;}
  .brand .name{font-family:'Poppins',sans-serif;font-weight:800;font-size:1.6rem;color:var(--ink);line-height:1;}
  .brand .name span{color:var(--red);}
  .brand .tagline{font-size:.75rem;color:#9a8f86;font-weight:600;}

  .search-wrap{position:relative;}
  .search-wrap input{width:100%;background:#f4f0ec;border:2px solid transparent;border-radius:12px;padding:12px 20px 12px 46px;font-size:.95rem;color:var(--ink);transition:.3s;outline:none;}
  .search-wrap input:focus{background:#fff;border-color:var(--orange);box-shadow:0 0 0 4px rgba(255,138,61,.1);}
  .search-wrap i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#9a8f86;font-size:1.1rem;}
  .search-wrap button{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--ink);color:#fff;border:none;border-radius:8px;padding:6px 14px;font-weight:600;font-size:.85rem;transition:.2s;}
  .search-wrap button:hover{background:var(--red);}
  
  .header-icon-btn{background:none;border:none;color:var(--ink);font-weight:600;font-size:.95rem;display:flex;align-items:center;gap:8px;transition:.2s;padding:8px 12px;border-radius:10px;}
  .header-icon-btn:hover{background:var(--cream);color:var(--red);}
  .icon-wrap{position:relative;font-size:1.3rem;display:flex;align-items:center;}

</style>
</head>
<body>


<div class="util-bar">
  <div class="container d-flex justify-content-between">
    <div>Free delivery on orders above ₹499</div>
    <div class="d-none d-md-block">
      <a href="track-order.html">Track Order</a>
      <a href="help.html">Help Center</a>
      <a href="sell.html">Sell on Swcart</a>
    </div>
  </div>
</div>

<header class="site-header">
  <div class="container">
    <div class="row align-items-center g-3">
      <div class="col-6 col-lg-2 d-flex align-items-center gap-2">
        <a href="index.html" class="brand">
          <img src="https://tools.swinfosystems.online/icon-192.png" alt="Swcart logo">
          <div>
            <div class="name">Sw<span>cart</span></div>
            <div class="tagline d-none d-sm-block">Everything, one cart</div>
          </div>
        </a>
      </div>
      <div class="col-12 col-lg-6 order-3 order-lg-2">
        <div class="search-wrap">
          <i class="bi bi-search"></i>
          <input type="text" placeholder="Search for products, brands and more">
          <button>Search</button>
        </div>
      </div>
      <div class="col-6 col-lg-4 order-2 order-lg-3">
        <div class="d-flex justify-content-end gap-3">
          <a href="profile.html" class="header-icon-btn d-none d-sm-flex">
            <i class="bi bi-person-circle"></i>
            <span class="d-none d-md-inline">Account</span>
          </a>
          <a href="index.html" class="header-icon-btn">
            <span class="icon-wrap"><i class="bi bi-heart"></i></span>
            <span class="d-none d-md-inline">Wishlist</span>
          </a>
          <a href="checkout.html" class="header-icon-btn">
            <span class="icon-wrap"><i class="bi bi-cart3"></i><span class="badge-count" id="globalCartCount" style="position:absolute;top:-6px;right:-8px;background:var(--red);color:#fff;font-size:.65rem;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;display:none;">0</span></span>
            <span class="d-none d-md-inline">Cart</span>
          </a>
        </div>
      </div>
    </div>
  </div>
</header>


<div class="page-title">
  <h1>Shop by Category</h1>
  <p>Explore our wide range of products across all departments.</p>
</div>

<section class="container cat-grid">
  <div class="row g-4" id="catContainer">
    <!-- Rendered via JS -->
  </div>
</section>

<footer>
  <div class="container">
    <div class="footer-bottom">
      © 2026 Swcart. All rights reserved.
    </div>
  </div>
</footer>

<script>
  const CATEGORIES = [
    {name:"Electronics", img:"https://images.unsplash.com/photo-1498049794561-7780e7231661?auto=format&fit=crop&w=600&q=80"},
    {name:"Fashion", img:"https://images.unsplash.com/photo-1445205170230-053b83016050?auto=format&fit=crop&w=600&q=80"},
    {name:"Home & Kitchen", img:"https://images.unsplash.com/photo-1556228453-efd6c1ff04f6?auto=format&fit=crop&w=600&q=80"},
    {name:"Grocery", img:"https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=600&q=80"},
    {name:"Beauty", img:"https://images.unsplash.com/photo-1596462502278-27bf85033e5a?auto=format&fit=crop&w=600&q=80"},
    {name:"Sports", img:"https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=600&q=80"},
    {name:"Toys & Games", img:"https://images.unsplash.com/photo-1566576912321-d58ddd7a6088?auto=format&fit=crop&w=600&q=80"},
    {name:"Books", img:"https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?auto=format&fit=crop&w=600&q=80"},
    {name:"Tools", img:"https://images.unsplash.com/photo-1530124566582-a618bc2615dc?auto=format&fit=crop&w=600&q=80"},
  ];

  const container = document.getElementById("catContainer");
  container.innerHTML = CATEGORIES.map(c => `
    <div class="col-md-6 col-lg-4">
      <a href="index.html" class="cat-card">
        <img src="${c.img}" alt="${c.name}" class="cat-img">
        <div class="cat-overlay">
          <h3>${c.name}</h3>
          <span>Shop now <i class="bi bi-arrow-right"></i></span>
        </div>
      </a>
    </div>
  `).join("");
</script>
</body>
</html>
